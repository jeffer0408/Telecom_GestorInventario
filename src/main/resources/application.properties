server.port=${PORT:8080}

# --- Conexion a MySQL ---
# En local usa XAMPP (valores por defecto). En Render/produccion, estas
# 3 variables se configuran como Environment Variables en el panel del hosting
# y NUNCA se escriben aqui en texto plano.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/inventario_telecom?useSSL=false&serverTimezone=America/Lima&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# --- Jackson ---
spring.jackson.date-format=dd/MM/yyyy HH:mm
spring.jackson.time-zone=America/Lima

# --- Correo (Gmail) para enviar el codigo de verificacion al Admin ---
# IMPORTANTE: spring.mail.password NO es la contraseña normal de Gmail.
# Debes generar una "contraseña de aplicacion" en tu cuenta de Google
# (con la verificacion en 2 pasos activada).
# Estos valores tambien se configuran como Environment Variables en produccion.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Correo del Admin al que llegan los codigos de verificacion para registrar un Encargado
app.admin.correo=${ADMIN_CORREO:}

# Datos de la cuenta Admin que se crea automaticamente al iniciar la app (si no existe)
app.admin.usuario=${ADMIN_USUARIO:admin}
app.admin.password=${ADMIN_PASSWORD:changeme}
app.admin.nombre=${ADMIN_NOMBRE:Administrador}
app.admin.dni=${ADMIN_DNI:00000000}
app.admin.celular=${ADMIN_CELULAR:000000000}
