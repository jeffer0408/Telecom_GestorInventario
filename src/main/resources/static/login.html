<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar sesión | Telecom Inventario</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-body">

  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-brand">
        <strong>Telecom Inventario</strong>
        <small>Gestion de almacen</small>
      </div>

      <h1>Iniciar sesión</h1>
      <p class="auth-sub">Ingresa con tu usuario y contraseña.</p>

      <form id="formLogin" class="auth-form">
        <div class="field">
          <label for="username">Usuario</label>
          <input type="text" id="username" required autocomplete="username">
        </div>
        <div class="field">
          <label for="password">Contraseña</label>
          <input type="password" id="password" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary auth-submit">Ingresar</button>
      </form>

      <p class="auth-foot">
        ¿Eres encargado de almacén y no tienes cuenta?
        <a href="registro.html">Regístrate aquí</a>
      </p>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/main.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
